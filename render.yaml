# Render.com Blueprint — one-click deploy to a permanent, free, public URL.
# In Render: New ▸ Blueprint ▸ connect this repo. It reads this file.
services:
  - type: web
    name: synapse
    runtime: node
    plan: free                      # free tier: permanent *.onrender.com URL, sleeps when idle
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "24"                 # node:sqlite ships with Node 24 (no flag needed)
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true         # Render generates a strong secret for you
      - key: AI_PROVIDER
        value: mock                 # keeps the public app free (no API cost). Set to "anthropic" + add ANTHROPIC_API_KEY to enable real Claude.
      - key: AI_MODEL
        value: claude-sonnet-4-6
      # Add these in the Render dashboard if you want accounts/progress to persist across deploys and restarts.
      # Without Turso, the app still runs, but Render's local filesystem is not permanent.
      # - key: TURSO_DATABASE_URL
      #   sync: false
      # - key: TURSO_AUTH_TOKEN
      #   sync: false
      # - key: ANTHROPIC_API_KEY
      #   sync: false               # add in the Render dashboard if you enable real AI
      # Stripe (optional — for real $10 checkout instead of dev bypass):
      # - key: STRIPE_SECRET_KEY
      #   sync: false
      # - key: STRIPE_WEBHOOK_SECRET
      #   sync: false               # get from: stripe listen --forward-to <your-render-url>/api/webhooks/payment
      # - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      #   sync: false
